<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>About — Naam Achternaam</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300;1,400;1,700&family=Literata:ital,wght@0,300;0,400;0,500;0,600;1,400;1,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

const PERSON = {
  name:     'Sam ten Voorde',
  role:     'Graphic & Motion Designer',
  city:     'Utrecht, NL',
  bio:      'I work across graphic design, motion, and illustration — mostly for cultural clients, small studios, and people making independent things. Currently based in Utrecht, available for commissions and collaborations from 2026 onward.',
  email:    'samtenvoorde@pm.me',
  linkedin: 'https://www.linkedin.com/in/sam-ten-voorde/',
};

const initials = (name) => name.split(' ').map(w => w[0]).join('');

const SLICE_COUNT = 9;

const NAV_ITEMS = [
  { label: 'Work',    href: 'index.html#work' },
  { label: 'About',   href: 'about.html' },
  { label: 'Contact', href: 'contact.html' },
];

function Menu({ open, closing, onClose }) {
  const [seed, setSeed] = useState(0);
  const delaysRef = useRef(Array.from({ length: SLICE_COUNT }, () => Math.random()));

  useEffect(() => {
    delaysRef.current = Array.from({ length: SLICE_COUNT }, () => Math.random());
    setSeed(s => s + 1);
  }, [open, closing]);

  if (!open) return null;
  const delays = delaysRef.current;

  return (
    <>
      <div style={{ position: 'fixed', inset: 0, zIndex: 49, display: 'flex', pointerEvents: 'none' }}>
        {delays.map((r, si) => {
          const d = closing ? r * 240 + 120 : r * 300;
          return (
            <div key={`o${si}-${seed}`} style={{
              flex: 1, height: '100%', background: '#ec5d00',
              animation: closing
                ? `boldSliceDown 520ms cubic-bezier(0.76, 0, 0.24, 1) ${d}ms both`
                : `boldSliceUp 520ms cubic-bezier(0.76, 0, 0.24, 1) ${d}ms both`,
            }} />
          );
        })}
      </div>

      <div style={{ position: 'fixed', inset: 0, zIndex: 50, display: 'flex', pointerEvents: 'none' }}>
        {delays.map((r, si) => {
          const d = closing ? r * 180 : r * 320 + 160;
          return (
            <div key={`d${si}-${seed}`} style={{
              flex: 1, height: '100%', background: '#2a2a2a',
              animation: closing
                ? `boldSliceDown 520ms cubic-bezier(0.76, 0, 0.24, 1) ${d}ms both`
                : `boldSliceUp 560ms cubic-bezier(0.76, 0, 0.24, 1) ${d}ms both`,
            }} />
          );
        })}
      </div>

      <div style={{
        position: 'fixed', inset: 0, zIndex: 51,
        color: '#f0f0f0',
        padding: 'clamp(20px, 3vw, 40px)',
        display: 'flex', flexDirection: 'column',
        animation: closing
          ? 'boldMenuContentOut 250ms ease-in forwards'
          : 'boldMenuContentIn 500ms ease-out 500ms both',
      }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <div style={{
            fontFamily: '"Open Sans", sans-serif',
            fontSize: 13, fontWeight: 700, letterSpacing: -0.2,
            color: '#f0f0f0',
          }}>
            {initials(PERSON.name)}<span style={{ color: '#ec5d00' }}>.</span>
          </div>
          <button onClick={onClose} style={{
            background: 'none', border: 'none',
            fontSize: 28, color: '#f0f0f0', lineHeight: 1,
            transform: closing ? 'rotate(90deg) scale(0.6)' : 'rotate(0) scale(1)',
            transition: 'transform 300ms cubic-bezier(0.76, 0, 0.24, 1)',
          }} aria-label="Close menu">×</button>
        </div>

        <nav style={{ flex: 1, display: 'flex', flexDirection: 'column', justifyContent: 'center', gap: 0 }}>
          {NAV_ITEMS.map(({ label, href }, idx) => (
            <a
              key={label}
              href={href}
              style={{
                fontFamily: '"Open Sans", sans-serif',
                fontSize: 'clamp(52px, 9vw, 96px)',
                fontWeight: 800,
                letterSpacing: 'clamp(-2px, -0.04em, -4px)',
                color: '#f0f0f0',
                lineHeight: 1.05,
                textDecoration: 'none',
                display: 'flex', alignItems: 'baseline', gap: 20,
                overflow: 'hidden',
                animation: closing
                  ? `boldMenuLineOut 250ms cubic-bezier(0.76, 0, 0.24, 1) ${idx * 40}ms both`
                  : `boldMenuLineIn 550ms cubic-bezier(0.22, 1, 0.36, 1) ${560 + idx * 80}ms both`,
                transition: 'color 200ms',
              }}
              onMouseEnter={e => e.currentTarget.style.color = '#ec5d00'}
              onMouseLeave={e => e.currentTarget.style.color = '#f0f0f0'}
            >
              {label}
              <span style={{ flex: 1 }} />
              <span style={{ fontFamily: 'Literata, serif', fontSize: '0.3em', fontStyle: 'italic', color: '#8c8c8c', fontWeight: 400 }}>→</span>
            </a>
          ))}
        </nav>

        <div style={{
          fontFamily: '"JetBrains Mono", monospace', fontSize: 11,
          color: '#8c8c8c', letterSpacing: 1,
          display: 'flex', justifyContent: 'space-between',
          animation: closing ? 'boldMenuContentOut 250ms ease-in forwards' : 'boldMenuContentIn 500ms ease-out 700ms both',
        }}>
          <span>{PERSON.city}</span>
          <span>{PERSON.email}</span>
        </div>
      </div>
    </>
  );
}

function App() {
  const [mounted,     setMounted]     = useState(false);
  const [menuOpen,    setMenuOpen]    = useState(false);
  const [menuClosing, setMenuClosing] = useState(false);

  useEffect(() => {
    const t = setTimeout(() => setMounted(true), 60);
    return () => clearTimeout(t);
  }, []);

  const openMenu  = () => { setMenuClosing(false); setMenuOpen(true); };
  const closeMenu = () => {
    setMenuClosing(true);
    setTimeout(() => { setMenuOpen(false); setMenuClosing(false); }, 900);
  };

  return (
    <div style={{ position: 'fixed', inset: 0, background: '#f0f0f0', overflow: 'hidden', display: 'flex', flexDirection: 'column' }}>

      {/* Nav */}
      <nav style={{
        position: 'fixed', top: 0, left: 0, right: 0,
        display: 'flex', justifyContent: 'space-between', alignItems: 'center',
        padding: 'clamp(16px, 2.5vw, 28px) clamp(20px, 4vw, 40px)',
        zIndex: 40, pointerEvents: 'none',
      }}>
        <a href="index.html" style={{
          fontFamily: '"Open Sans", sans-serif',
          fontSize: 13, fontWeight: 700, letterSpacing: -0.2,
          color: '#f0f0f0', textDecoration: 'none',
          background: 'rgba(42,42,42,0.72)',
          backdropFilter: 'blur(10px)',
          WebkitBackdropFilter: 'blur(10px)',
          padding: '8px 14px',
          borderRadius: 999,
          pointerEvents: 'auto',
        }}>
          {initials(PERSON.name)}<span style={{ color: '#ec5d00' }}>.</span>
        </a>
        <button onClick={openMenu} aria-label="Open menu" style={{
          display: 'flex', flexDirection: 'column', gap: 4.5,
          background: 'rgba(42,42,42,0.72)',
          backdropFilter: 'blur(10px)',
          WebkitBackdropFilter: 'blur(10px)',
          border: 'none',
          borderRadius: 999,
          padding: '10px 12px',
          pointerEvents: 'auto',
        }}>
          {[0,1,2].map(k => (
            <div key={k} style={{ width: 18, height: 1.5, background: '#f0f0f0' }} />
          ))}
        </button>
      </nav>

      {/* Scrollable content */}
      <div style={{ flex: 1, overflowY: 'auto', overflowX: 'hidden' }}>
        <section style={{
          background: '#f0f0f0', color: '#373737',
          minHeight: '100dvh',
          padding: 'clamp(100px, 14vw, 180px) clamp(24px, 5vw, 72px) clamp(60px, 10vw, 120px)',
        }}>
          <div style={{
            display: 'grid',
            gridTemplateColumns: 'repeat(auto-fit, minmax(280px, 1fr))',
            gap: 'clamp(40px, 6vw, 80px)',
            alignItems: 'start',
          }}>
            {/* Portrait placeholder */}
            <div style={{
              aspectRatio: '3/4',
              background: '#dcdcdc',
              maxWidth: 360,
              opacity: mounted ? 1 : 0,
              transform: mounted ? 'translateY(0)' : 'translateY(32px)',
              transition: 'transform 900ms cubic-bezier(0.22, 1, 0.36, 1) 100ms, opacity 700ms ease 100ms',
            }} aria-label="Portrait photo" />

            {/* Bio column */}
            <div style={{ paddingTop: 8 }}>
              <div style={{
                fontFamily: '"JetBrains Mono", monospace', fontSize: 10, color: '#8c8c8c',
                letterSpacing: 1.5, textTransform: 'uppercase', marginBottom: 20,
                opacity: mounted ? 1 : 0,
                transform: mounted ? 'translateY(0)' : 'translateY(20px)',
                transition: 'transform 700ms cubic-bezier(0.22, 1, 0.36, 1) 200ms, opacity 500ms ease 200ms',
              }}>
                About
              </div>
              <h1 style={{
                fontFamily: '"Open Sans", sans-serif',
                fontSize: 'clamp(32px, 5vw, 64px)',
                fontWeight: 800, lineHeight: 0.92,
                letterSpacing: 'clamp(-1px, -0.03em, -3px)',
                color: '#373737', marginBottom: 28,
                opacity: mounted ? 1 : 0,
                transform: mounted ? 'translateY(0)' : 'translateY(28px)',
                transition: 'transform 900ms cubic-bezier(0.22, 1, 0.36, 1) 300ms, opacity 700ms ease 300ms',
              }}>
                {PERSON.name}
              </h1>
              <p style={{
                fontFamily: 'Literata, serif', fontSize: 18, lineHeight: 1.65,
                color: '#373737', maxWidth: 520, marginBottom: 32,
                opacity: mounted ? 1 : 0,
                transform: mounted ? 'translateY(0)' : 'translateY(24px)',
                transition: 'transform 900ms cubic-bezier(0.22, 1, 0.36, 1) 420ms, opacity 700ms ease 420ms',
              }}>
                {PERSON.bio}
              </p>
              <div style={{
                fontFamily: '"JetBrains Mono", monospace', fontSize: 10, color: '#8c8c8c',
                letterSpacing: 1, textTransform: 'uppercase',
                opacity: mounted ? 1 : 0,
                transform: mounted ? 'translateY(0)' : 'translateY(20px)',
                transition: 'transform 700ms cubic-bezier(0.22, 1, 0.36, 1) 540ms, opacity 500ms ease 540ms',
              }}>
                {PERSON.role} · {PERSON.city}
              </div>
            </div>
          </div>
        </section>
      </div>

      <Menu open={menuOpen} closing={menuClosing} onClose={closeMenu} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
